      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.72" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fd"/>
    </radialGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
